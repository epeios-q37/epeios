<datalist id="Devices">
  {}
</datalist>
<fieldset>
  <legend>Showoff</legend>
  <fieldset style="display: flex; flex-direction: column; row-gap: 15px;">
    <legend>Partner</legend>
    <div style="display: flex; justify-content: space-between;">
      <input id="PartnerDevice" list="Devices" value="{}" class="clearable" placeholder="Device">
      <button xdh:onevent="PartnerConnect">Connect</button>
    </div>
    <div style="display: grid; grid-template-columns: auto auto auto; justify-content: space-around; grid-row-gap: 8px;">
      <button xdh:onevent="PartnerBuzzer">Buzzer</button>
      <button xdh:onevent="PartnerOLED">OLED</button>
      <button xdh:onevent="PartnerRing">Ring</button>
      <button xdh:onevent="PartnerLCD">LCD</button>
      <button xdh:onevent="PartnerListen">Listen</button>
      <button xdh:onevent="PartnerIndy">Indy</button>
      <input id="PartnerColors" type="hidden">
    </div>
  </fieldset>
  <fieldset>
    <legend>Show</legend>
    <fieldset style="display: flex; justify-content: space-around; gap: 5px;">
      <legend>Devices</legend>
      <div style="display: flex; flex-direction: column; gap: 5px;">
        <input id="ShowLeftDevice" list="Devices" value="{}" class="clearable" placeholder="Left device">
        <input id="ShowMiddleDevice" list="Devices" value="{}" class="clearable" placeholder="Middle device">
        <input id="ShowRightDevice" list="Devices" value="{}" class="clearable" placeholder="Right device">
      </div>
      <div style="display: flex; flex-direction: column; gap: 5px;">
        <button xdh:onevent="ShowConnect">Connect</button>
        <button xdh:onevent="ShowSync">Sync</button>
        <button xdh:onevent="ShowTest">Test</button>
      </div>
    </fieldset>
    <div style="display: flex; width: 100%;">
      <fieldset style="display:flex; justify-content: space-around; width: 100%">
        <legend>Music</legend>
        <button xdh:onevent="ShowIndy">Indy</button>
        <button xdh:onevent="ShowPink">Pink</button>
        <button xdh:onevent="ShowFugue">Fugue</button>
      </fieldset>
      <fieldset>
        <legend>Countdown</legend>
        <label>
          <span>Display: </span>
          <input id="Countdown" style="vertical-align: bottom;" type="checkbox" checked />
        </label>
      </fieldset>
    </div>
    <fieldset>
      <legend>Colors</legend>
      <div style="display:flex; justify-content: space-around">
        <select id="ColorSchemes"></select>
        <button xdh:onevent="ShowColorOnce">Once</button>
        <button xdh:onevent="ShowColorRepeat">Repeat</button>
      </div>
      <br />
      <div style="display:flex; flex-direction: column;">
        <div style="display: flex;">
          <label style="display:flex; justify-content: space-between; width: 100%">
            <span>Delay: </span>
            <input id="ColorDelay" type="range" min=".01" max=".3" step=".01" value=".09" xdh:onevent="ShowColorUpdate">
          </label>
          <input id="ColorDelayDisplay" type="text" size="3" style="text-align: right;" disabled>
        </div>
        <div style="display: flex;">
          <label style="display:flex; justify-content: space-between; width: 100%">
            <span>Repeat: </span>
            <input id="ColorRepeat" type="range" min="2" max="5" value="3" xdh:onevent="ShowColorUpdate">
          </label>
          <input id="ColorRepeatDisplay" type="text" size="3" style="text-align: right;" disabled>
        </div>
      </div>
    </fieldset>
  </fieldset>
</fieldset>
